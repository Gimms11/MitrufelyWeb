# ─── Configuración nginx para SPA Mitrufely ───────────────────────────────────
# Sirve el build de producción de Vite con:
#   - Gzip pre-comprimido (.gz generado por vite-plugin-compression2)
#   - Gzip on-the-fly para recursos sin .gz pre-generado
#   - Cache headers inmutables para assets con hash
#   - SPA fallback (try_files → index.html)
#
# Nota: brotli_static no está disponible en nginx:alpine base.
# Los archivos .br generados por Vite se sirven si el navegador los acepta
# gracias a gzip_static + gzip on-the-fly como fallback.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Security Headers (M-10: CWE-693) ──────────────────────────────────
    # Cabeceras de seguridad aplicadas a TODAS las respuestas.
    # En producción, nginx debe estar detrás de TLS (listen 443 ssl);
    # HSTS se incluye asumiendo terminación TLS en nginx o en un proxy upstream.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # CSP para SPA: permitimos self para scripts/estilos/connect, sin unsafe-inline
    # (Vite genera bundles sin inline scripts en producción).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # HSTS — solo tiene efecto sobre HTTPS. Si nginx termina TLS, esto fuerza HTTPS.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─── Compresión gzip on-the-fly (para recursos sin .gz pre-generado) ─────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ─── Habilitar servir archivos .gz pre-comprimidos ───────────────────────
    gzip_static on;

    # ─── Assets con hash (caching inmutable a 1 año) ─────────────────────────
    location /assets/ {
        gzip_static on;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # CORS para fonts/modules si se sirve desde otro dominio
        add_header Access-Control-Allow-Origin "*";
    }

    # ─── Imágenes WebP/AVIF/PNG (cache medio) ────────────────────────────────
    location ~* \.(webp|avif|png|jpg|jpeg|gif|ico)$ {
        gzip_static off;
        add_header Cache-Control "public, max-age=86400";
    }

    # ─── SVGs (cacheable + comprimible) ──────────────────────────────────────
    location ~* \.svg$ {
        gzip_static on;
        add_header Cache-Control "public, max-age=604800";
    }

    # ─── Fuentes (.woff2, .woff, .ttf) ───────────────────────────────────────
    location ~* \.(woff2?|ttf|eot|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ─── index.html: NO cachear (siempre la versión más reciente) ────────────
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        gzip_static on;
    }

    # ─── SPA fallback: cualquier ruta desconocida → index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Página de error personalizada (opcional) ────────────────────────────
    error_page 404 /index.html;
}
