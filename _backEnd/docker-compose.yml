# ==============================================================================
# Mifrufely Web — Docker Compose (Development) — Backend standalone
# Ejecutar desde: MitrufelyWeb/_backEnd/
# ==============================================================================

services:

  # ── FastAPI Application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app
      - --log-level
      - info
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - DEBUG=true
      - PYTHONPATH=/app
      - WATCHFILES_FORCE_POLLING=true
      - WATCHFILES_POLL_DELAY_MS=1000
      # ─── REDIS / CELERY — VALORES DEFINITIVOS (no cambiar) ───────────────
      - REDIS_URL=redis://redis:6399/0
      - CELERY_BROKER_URL=redis://redis:6399/1
      - CELERY_RESULT_BACKEND=redis://redis:6399/2
      # ─────────────────────────────────────────────────────────────────────
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mifrufely-net
    restart: on-failure

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    command: redis-server --port 6399 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6399:6399"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6399", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - mifrufely-net
    restart: unless-stopped

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command:
      - celery
      - -A
      - app.infrastructure.workers.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
      - -Q
      - celery
      - --without-mingle
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      # ─── REDIS / CELERY — VALORES DEFINITIVOS (no cambiar) ───────────────
      - REDIS_URL=redis://redis:6399/0
      - CELERY_BROKER_URL=redis://redis:6399/1
      - CELERY_RESULT_BACKEND=redis://redis:6399/2
      # ─────────────────────────────────────────────────────────────────────
      - C_FORCE_ROOT=true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mifrufely-net
    restart: on-failure

  # ── Celery Beat (Scheduler) ────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command:
      - celery
      - -A
      - app.infrastructure.workers.celery_app
      - beat
      - --loglevel=info
      - --scheduler
      - celery.beat:PersistentScheduler
      - --schedule
      - /var/celerybeat/celerybeat-schedule
    volumes:
      - .:/app
      - beat_schedule:/var/celerybeat
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      # ─── REDIS / CELERY — VALORES DEFINITIVOS (no cambiar) ───────────────
      - REDIS_URL=redis://redis:6399/0
      - CELERY_BROKER_URL=redis://redis:6399/1
      - CELERY_RESULT_BACKEND=redis://redis:6399/2
      # ─────────────────────────────────────────────────────────────────────
      - C_FORCE_ROOT=true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mifrufely-net
    restart: on-failure

volumes:
  redis_data:
  beat_schedule:

networks:
  mifrufely-net:
    driver: bridge
