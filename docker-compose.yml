services:

  # ── FastAPI Application ────────────────────────────────────────────────────
  api:
    build:
      context: ./_backEnd
      dockerfile: Dockerfile
      target: development
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app
      - --log-level
      - info
    volumes:
      - ./_backEnd:/app
    ports:
      - "127.0.0.1:8000:8000"
    # ORDEN IMPORTANTE: env_file primero, luego environment.
    # Docker Compose da prioridad a 'environment' sobre 'env_file'.
    # Las 3 variables de Redis se sobreescriben aquí de forma explícita
    # para garantizar el puerto correcto (6399) sin importar qué haya en el .env.
    env_file:
      - ./_backEnd/.env
    environment:
      - APP_ENV=development
      - DEBUG=true
      - PYTHONPATH=/app
      - WATCHFILES_FORCE_POLLING=true
      - WATCHFILES_POLL_DELAY_MS=1000
      # ─── REDIS / CELERY — VALORES DEFINITIVOS (no cambiar) ───────────────
      - REDIS_URL=redis://redis:6399/0
      - CELERY_BROKER_URL=redis://redis:6399/1
      - CELERY_RESULT_BACKEND=redis://redis:6399/2
      # ─────────────────────────────────────────────────────────────────────
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mifrufely-net
    restart: on-failure

  # ── Frontend (Vite build → nginx serve) ─────────────────────────────────────
  frontend:
    build:
      context: ./_frontEnd
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5173:80"   # nginx en :80 del container, expuesto en :5173 del host
    depends_on:
      - api
    networks:
      - mifrufely-net
    restart: on-failure

  # ── Delivery Microservice ──────────────────────────────────────────────────
  delivery-service:
    build:
      context: ./_deliveryService
      dockerfile: Dockerfile
    command:
      - uvicorn
      - main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8001"
      - --reload
    volumes:
      - ./_deliveryService:/app
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - BACKEND_URL=http://api:8000
      - DELIVERY_WEBHOOK_TOKEN=dev-webhook-token
      - PREPARATION_DELAY_SECONDS=5
      - DELIVERY_DELAY_SECONDS=10
    networks:
      - mifrufely-net
    restart: on-failure

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    # Puerto 6399 para evitar conflicto con cualquier Redis local en el host (6379)
    command: redis-server --port 6399 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6399:6399"   # Expuesto solo en localhost para evitar acceso externo
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6399", "ping"]
      interval: 5s      # Verificar cada 5s (más rápido para acelerar el arranque)
      timeout: 3s
      retries: 10       # 10 reintentos = hasta 50s de gracia antes de fallar
      start_period: 10s # Dar 10s extra al inicio para que Redis arranque
    networks:
      - mifrufely-net
    restart: unless-stopped

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./_backEnd
      dockerfile: Dockerfile
      target: development
    command:
      - celery
      - -A
      - app.infrastructure.workers.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
      - -Q
      - celery
      # Suprimir el warning de root (solo desarrollo)
      - --without-mingle
    volumes:
      - ./_backEnd:/app
    env_file:
      - ./_backEnd/.env
    environment:
      - PYTHONPATH=/app
      # ─── REDIS / CELERY — VALORES DEFINITIVOS (no cambiar) ───────────────
      - REDIS_URL=redis://redis:6399/0
      - CELERY_BROKER_URL=redis://redis:6399/1
      - CELERY_RESULT_BACKEND=redis://redis:6399/2
      # ─────────────────────────────────────────────────────────────────────
      # Suprimir el warning de root en desarrollo
      - C_FORCE_ROOT=true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mifrufely-net
    restart: on-failure

  # ── Celery Beat (Scheduler) ────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./_backEnd
      dockerfile: Dockerfile
      target: development
    command:
      - celery
      - -A
      - app.infrastructure.workers.celery_app
      - beat
      - --loglevel=info
      - --scheduler
      - celery.beat:PersistentScheduler
      - --schedule
      - /var/celerybeat/celerybeat-schedule
    volumes:
      - ./_backEnd:/app
      - beat_schedule:/var/celerybeat
    env_file:
      - ./_backEnd/.env
    environment:
      - PYTHONPATH=/app
      # ─── REDIS / CELERY — VALORES DEFINITIVOS (no cambiar) ───────────────
      - REDIS_URL=redis://redis:6399/0
      - CELERY_BROKER_URL=redis://redis:6399/1
      - CELERY_RESULT_BACKEND=redis://redis:6399/2
      # ─────────────────────────────────────────────────────────────────────
      - C_FORCE_ROOT=true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mifrufely-net
    restart: on-failure

volumes:
  redis_data:
  beat_schedule:

networks:
  mifrufely-net:
    driver: bridge
